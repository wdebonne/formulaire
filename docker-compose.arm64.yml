version: '3.8'

# Configuration pour processeurs ARM64 (Raspberry Pi 4/5, Apple Silicon, Oracle Cloud ARM)
# Utilisez cette configuration sur les serveurs ARM

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: formbuilder:arm64
    ports:
      - "3110:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - APP_URL=${APP_URL:-http://localhost:3110}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@formbuilder.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-FormBuilder}
    volumes:
      - sqlite-data:/app/prisma
      - uploads-data:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Plus de temps pour ARM

volumes:
  sqlite-data:
    driver: local
  uploads-data:
    driver: local
