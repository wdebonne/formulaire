version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3110:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - APP_URL=${APP_URL:-http://localhost:3110}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@formbuilder.local}
    volumes:
      - sqlite-data:/app/prisma
      - uploads-data:/app/public/uploads
    restart: unless-stopped

volumes:
  sqlite-data:
  uploads-data:
