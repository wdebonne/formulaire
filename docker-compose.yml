version: '3.8'

# Configuration universelle - détecte automatiquement l'architecture
# Fonctionne sur AMD64 (Intel/AMD) et ARM64 (Raspberry Pi, Apple Silicon)
#
# Fichiers alternatifs disponibles :
# - docker-compose.amd64.yml : Pour forcer AMD64 (Intel/AMD)
# - docker-compose.arm64.yml : Pour forcer ARM64 (Raspberry Pi, Apple Silicon)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formbuilder
    ports:
      - "3110:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - APP_URL=${APP_URL:-http://localhost:3110}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@formbuilder.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-FormBuilder}
    volumes:
      - sqlite-data:/app/prisma/data
      - uploads-data:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite-data:
    driver: local
  uploads-data:
    driver: local
